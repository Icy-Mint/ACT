name: Materials Carbon Intensity Model
materials:
  # from https://worldsteel.org/climate-action/climate-change-and-the-production-of-iron-and-steel/
  steel: 1.89 kg / kg

  # from https://international-aluminium.org/landing/as-well-as-aluminium-recycling-saving-95-of-the-energy-needed-for-primary-aluminium-production-the-recycling-process-saves-a-similar-percentage-in-greenhouse-gas-emissions/
  alumnimum: 15.1 kg / kg

  # from https://ecoquery.ecoinvent.org/3.11/cutoff/dataset/1542/documentation
  tin: 10.09629525 kg / kg

  # from https://ecoquery.ecoinvent.org/3.11/cutoff/dataset/8476/documentation
  bronze: 7.122581312 kg / kg

  # Aluminum primary ingot (China Mix)
  # Dataset: aluminum production, primary, ingot, China mix
  # Source: Ecoinvent 3.11 cutoff database
  aluminum: 21.8 kg / kg

  # Pb-free solder (Sn-Ag-Cu alloy, RoHS compliant)
  # Dataset: market for mounting, through-hole technology, Pb-free solder
  # Source: Ecoinvent 3.11 cutoff database
  # Higher than pure tin due to silver/copper alloying elements and processing
  pb_free_solder: 46.48635406 kg / kg
